<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }} - Mi Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <a href="{% url 'tienda:product_list' %}" class="btn btn-outline-secondary mb-4">← Volver al catálogo</a>
    
    <div class="row">
        <div class="col-md-6">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid rounded shadow">
            {% else %}
                <img src="https://via.placeholder.com/600x400" class="img-fluid rounded">
            {% endif %}
        </div>
        <div class="col-md-6">
            <h1>{{ product.name }}</h1>
            <h3 class="text-muted">{{ product.category.name }}</h3>
            <hr>
            <p class="lead">{{ product.description }}</p>
            <h2 class="text-success mb-4">${{ product.price }}</h2>
            
            <form action="{% url 'tienda:cart_add' product.id %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary btn-lg w-100">Añadir al carrito</button>
            </form>
        </div>
    </div>
</body>
</html>
